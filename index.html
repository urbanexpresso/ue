    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const style = document.createElement("style");
        style.innerHTML = `
            @keyframes fadeIn {
              from {
                opacity: 0;
              }
              to {
                opacity: 1;
              }
            }
            
            .info01, .arrow_01,
            .info02, .arrow_02,
            .info2, .arrow_2,
            .info1, .arrow_1 {
              opacity: 0;
            }
          `;
        document.head.appendChild(style);

        const elements = [
          [".info01", ".arrow_01"],
          [".info02", ".arrow_02"],
          [".info2", ".arrow_2"],
          [".info1", ".arrow_1"],
        ];

        elements.forEach((pair, index) => {
          setTimeout(() => {
            pair.forEach((selector) => {
              const element = document.querySelector(selector);
              if (element) {
                element.style.animation = "fadeIn 1s ease-out forwards";
              }
            });
          }, (index + 1) * 1000); // 1-second delay per pair
        });
      });
    </script>
  </body>
